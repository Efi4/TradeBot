services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tradebot-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "@dmin!23"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P @dmin!23 -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    hostname: azurite
    restart: always
    command: "azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    network_mode: "host"
    volumes:
      - azurite_data:/var/opt/azurite
volumes:
  sqlserver_data:
    driver: local
  azurite_data:
    driver: local
