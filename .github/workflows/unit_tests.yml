name: .NET Unit Tests

on:
workflow_dispatch:
workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --filter TestCategory!=Integration --no-restore --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: ./TestResults/TestResults.trx