name: .NET Integration Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Install Azure Functions Core Tools
      uses: Azure/setup-azure-functions-core-tools@v1
      with:
        functions-version: '4'
   
    - name: Prepare Test Environment
      run: |
        docker compose up -d --wait
        func start --script-root ./AzureFunctionApp --no-build 

    - name: Test
      run: dotnet test --filter TestCategory=Integration --no-restore --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: ./TradeBot.IntegrationTests/TestResults/TestResults.trx